[project]
name = "cuttingboard"
version = "1.0.0"
requires-python = ">=3.11"

dependencies = [
    "yfinance>=0.2.40",
    "pandas>=2.0.0",
    "numpy>=1.26.0",          # directly imported by tests/test_derived.py
    "requests>=2.31.0",
    "python-dotenv>=1.0.0",
    "pyarrow>=14.0.0",        # transitive, required for parquet I/O via pandas
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "ruff>=0.4.0",
    "PyYAML>=6.0",            # tests/test_ci_artifact_hygiene.py parses workflow YAML
]
chain = [
    "yahooquery>=2.3.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["cuttingboard*"]
