# Cloudflare Worker config for the cuttingboard external trigger (PRD-149).
# Deploy with `wrangler deploy`. Secret with `wrangler secret put GITHUB_TOKEN`.
#
# Cloudflare's free plan caps a Worker at 5 cron triggers, so this Worker runs
# a single coarse heartbeat every 15 minutes during the weekday UTC window that
# covers premarket through close. The PRD-141 slot dedup gate (one alert per PT
# hour) decides whether each dispatched run actually sends — exact-slot
# mirroring of hourly_alert.yml is unnecessary because the gate collapses
# overlapping firings.

name = "cuttingboard-external-trigger"
main = "worker.js"
compatibility_date = "2026-05-19"

[triggers]
crons = [
  # Coarse heartbeat: every 15 min, 12:00–21:45 UTC, Mon–Fri.
  # Covers premarket warm-up (12:50/13:00) and intraday (14:00–21:30) windows.
  "*/15 12-21 * * 1-5",
]
