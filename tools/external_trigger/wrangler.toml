# Cloudflare Worker config for the cuttingboard external trigger (PRD-149).
# Deploy with `wrangler deploy`. Secret with `wrangler secret put GITHUB_TOKEN`.
#
# Cron schedule mirrors .github/workflows/hourly_alert.yml so external dispatch
# tracks the same operational cadence. PRD-141 slot dedup absorbs duplicates
# when both the GH-native cron and this Worker fire for the same PT slot.

name = "cuttingboard-external-trigger"
main = "worker.js"
compatibility_date = "2026-05-19"

[triggers]
crons = [
  # Pre-open warm-up: 12:50 UTC (premarket)
  "50 12 * * 1-5",
  # Pre-open warm-up backup: 12:55 UTC (PRD-144 mirror)
  "55 12 * * 1-5",
  # Pre-open: 13:00 UTC = 6:00 AM PT
  "0 13 * * 1-5",
  # 6:00 AM PT backup: 13:05 UTC (PRD-144 mirror)
  "5 13 * * 1-5",
  # ORB window / market open: 13:50 UTC
  "50 13 * * 1-5",
  # Intraday every 30 min: 14:00–21:30 UTC
  "*/30 14-21 * * 1-5",
]
