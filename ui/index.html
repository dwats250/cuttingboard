<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cutting Board — Decision Surface</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Controls -->
  <div id="controls">
    <div id="controls-load">
      <label id="file-label" for="file-input">Load Contract</label>
      <input type="file" id="file-input" accept=".json">
      <button id="paste-toggle">paste JSON</button>
    </div>
    <div id="paste-area">
      <textarea id="paste-input" placeholder="Paste contract JSON here..."></textarea>
      <button id="paste-btn">Render</button>
    </div>
  </div>

  <!-- Error / empty state -->
  <div id="status-msg"></div>

  <!-- Contract view -->
  <div id="contract-view">

    <!-- 1. Signal Bar -->
    <div class="block" id="signal-bar">
      <div id="signal-bar-inner">
        <div class="signal-cell">
          <div class="sig-label">Posture</div>
          <div class="sig-val" id="sig-posture"></div>
        </div>
        <div class="signal-cell">
          <div class="sig-label">Correlation</div>
          <div class="sig-val" id="sig-corr-state"></div>
        </div>
        <div class="signal-cell">
          <div class="sig-label">Risk</div>
          <div class="sig-val" id="sig-risk"></div>
        </div>
      </div>
    </div>

    <!-- 2. Primary Trade -->
    <div class="block" id="primary-trade-block">
      <div class="block-title">Primary Trade</div>
      <div id="primary-trade-inner"></div>
    </div>

    <!-- 3. No Trade (STAY_FLAT) -->
    <div class="block" id="no-trade-block">
      <div id="no-trade-label">NO TRADE</div>
      <div id="no-trade-reasons"></div>
    </div>

    <!-- 4. Watchlist -->
    <div class="block" id="watchlist-block">
      <div id="watchlist-label">WATCHLIST</div>
      <div id="watchlist-reasons"></div>
    </div>

    <!-- 5. Secondary Setups -->
    <div class="block" id="secondary-setups-block">
      <div class="block-title">Other Setups</div>
      <div class="table-wrap">
        <table id="secondary-setups-table">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Dir</th>
              <th>Entry Mode</th>
              <th>Strategy</th>
              <th>R:R</th>
            </tr>
          </thead>
          <tbody id="secondary-setups-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 6. Correlation -->
    <div class="block" id="correlation-block">
      <div class="block-title">Correlation</div>
      <div id="corr-state"></div>
      <div class="kv-row">
        <span class="kv-key">Risk modifier</span>
        <span class="kv-val" id="corr-modifier"></span>
      </div>
      <div class="kv-row">
        <span class="kv-key">Pair</span>
        <span class="kv-val" id="corr-pair"></span>
      </div>
    </div>

    <!-- 7. Rejections -->
    <div class="block" id="rejections-block">
      <details>
        <summary>Rejections</summary>
        <div class="table-wrap">
          <table id="rej-table">
            <thead>
              <tr>
                <th>Symbol</th>
                <th>Stage</th>
                <th>Reason</th>
              </tr>
            </thead>
            <tbody id="rej-tbody"></tbody>
          </table>
        </div>
        <div id="rej-empty" class="empty-state">No rejections</div>
      </details>
    </div>

    <!-- 8. Header (de-emphasized) -->
    <div class="block" id="header-block">
      <div id="header-timestamp"></div>
      <div id="header-regime"></div>
      <span id="header-status"></span>
    </div>

    <!-- 9. Router -->
    <div class="block" id="router-block">
      <div class="block-title">Router Mode</div>
      <div id="router-value"></div>
    </div>

  </div><!-- /contract-view -->

  <footer>Cutting Board — Decision Surface</footer>

  <script src="app.js"></script>
</body>
</html>
