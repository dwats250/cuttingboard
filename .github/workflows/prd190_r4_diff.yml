name: PRD-190 R4 diff (transient)

# Throwaway gate runner for PRD-190 R4: runs the live 6mo-vs-12mo EMA/ATR/SMA
# pre/post diff on a GitHub-hosted runner (which has yahoo egress). Triggered by
# push to the feature branch only; removed immediately after the gate is read so
# PR #35 stays single-purpose. Not part of PRD-190's shipped FILES.
on:
  push:
    branches: [claude/dashboard-surfaces-recon-flaxpy]
    paths:
      - scripts/prd190_r4_diff.py
      - .github/workflows/prd190_r4_diff.yml

jobs:
  r4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: python scripts/prd190_r4_diff.py
