name: Cuttingboard Hourly Alert

on:
  schedule:
    # PRD-149: PT-anchored allowed-slot set, 6:00 AM – 1:00 PM PT.
    # All times below are UTC (GitHub Actions cron is always UTC); the
    # runner's routine_pt_slot() gate is authoritative — fires outside
    # the allowed PT window are suppressed with audit reason
    # "outside_routine_window". DST-resilient: each unique UTC minute
    # listed once; 06:00 PT is the only slot with a +5min backup.
    - cron: '0 13 * * 1-5'    # 06:00 PDT (PST 05:00 -> gate-suppressed)
    - cron: '5 13 * * 1-5'    # 06:05 PDT — 06:00 PT redundancy backup
    - cron: '30 13 * * 1-5'   # 06:30 PDT (PST 05:30 -> gate-suppressed)
    - cron: '0 14 * * 1-5'    # 06:00 PST  /  07:00 PDT
    - cron: '5 14 * * 1-5'    # 06:05 PST — 06:00 PT redundancy backup
    - cron: '30 14 * * 1-5'   # 06:30 PST  /  07:30 PDT -> gate-suppressed
    - cron: '0 15-21 * * 1-5' # 08:00-14:00 PDT (14:00 -> gate-suppressed) /
                              # 07:00-13:00 PST (all in-window)
  workflow_dispatch:

# Per-workflow self-serialization: the 06:00 / 06:05-backup crons must not run
# concurrently or both could alert before either persists last_hourly_slot (dedup
# depends on the prior run's saved slot). PRD-194: cross-workflow publish races go
# through ci_push_artifacts.sh's delta-append + push-retry, not a shared lock that
# would over-serialize this alert behind the pipeline/macro producer (Codex P2).
concurrency:
  group: hourly-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest

    env:
      # PRD-194: artifacts publish to this unprotected branch, not main.
      PUBLISH_BRANCH: publish
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # PRD-194: pin to main. workflow_dispatch can be triggered from any branch;
      # publishing now targets the UNPROTECTED `publish` branch, so an unpinned
      # checkout would let a dispatch on a feature branch publish that branch's
      # rendered ui/logs to production. Scheduled runs already run on main.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      # PRD-194 R3: restore the read-back state the alert run reads at startup from
      # the publish branch (main's copies are frozen post-decoupling). Two kinds:
      #  OWNED (hourly regenerates + republishes):
      #   - logs/audit.jsonl: accumulating scoreboard source (delta-appended).
      #   - logs/last_hourly_slot.json: alert dedup slot (Codex P1) — without it the
      #     06:05 backup reads main's frozen slot and re-sends the 06:00 alert.
      #   - logs/latest_hourly_market_map.json: hourly's isolated lifecycle baseline
      #     (_load_previous_market_map at _execute_notify_run) — frozen => bogus
      #     hourly NEW/REMOVED transitions (Codex P2).
      #  READ-ONLY (pipeline OWNS+publishes; hourly only reads to render, then reverts
      #  to HEAD before commit so it never republishes a copy it doesn't own):
      #   - logs/latest_run.json: renderer's LIVE STATE (pipeline_run), not --run-
      #     overridable — frozen => stale LIVE STATE on the hourly dashboard (Codex P2).
      #   - logs/macro_drivers_snapshot.json: renderer's macro-driver fallback.
      # logs/regime_history.jsonl is NOT restored — rebuilt from audit by the Aggregate
      # step (which runs BEFORE the render). Records CB_PUBLISH_BASE_SHA for the delta.
      - name: Restore publish state
        run: bash tools/ci_restore_publish_state.sh logs/audit.jsonl logs/last_hourly_slot.json logs/latest_hourly_market_map.json logs/latest_run.json logs/macro_drivers_snapshot.json

      - name: Check Telegram config presence
        run: |
          echo "TELEGRAM_BOT_TOKEN_PRESENT=${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID_PRESENT=${{ secrets.TELEGRAM_CHAT_ID != '' }}"

      - name: Record alert-runner start
        id: starttime
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run hourly alert
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m cuttingboard.alert_runner --force-slot
          else
            python -m cuttingboard.alert_runner
          fi

      - name: Detect fresh hourly artifacts
        id: freshcheck
        if: ${{ success() }}
        run: |
          set -euo pipefail
          PAYLOAD=logs/latest_hourly_payload.json
          START_TS=${{ steps.starttime.outputs.ts }}
          if [ ! -f "$PAYLOAD" ]; then
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "alert_runner produced no hourly payload; skipping publish"
            exit 0
          fi
          payload_mtime=$(stat -c %Y "$PAYLOAD")
          if [ "$payload_mtime" -lt "$START_TS" ]; then
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "alert_runner suppressed slot (payload mtime=$payload_mtime < start=$START_TS); skipping publish"
          else
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "fresh hourly payload detected (mtime=$payload_mtime >= start=$START_TS)"
          fi

      # PRD-194 (Codex P1): aggregate BEFORE render so the dashboard scoreboard
      # reflects THIS run. regime_history.jsonl is fully rebuilt from the restored+
      # appended audit.jsonl; the renderer then reads the current file instead of
      # main's frozen copy. Resolves the parked PRD-189 render-before-aggregate
      # ordering nit, which decoupling promoted from cosmetic to a correctness bug.
      - name: Aggregate regime history
        if: ${{ success() && steps.freshcheck.outputs.fresh == 'true' }}
        run: python3 -m cuttingboard.delivery.regime_history

      - name: Render and stage hourly artifacts
        if: ${{ success() && steps.freshcheck.outputs.fresh == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp logs/latest_hourly_contract.json ui/contract.json
          python3 -m cuttingboard.delivery.dashboard_renderer \
            --payload logs/latest_hourly_payload.json \
            --run logs/latest_hourly_run.json \
            --market-map-path logs/latest_hourly_market_map.json \
            --output ui/dashboard.html
          cp ui/dashboard.html ui/index.html
          # PRD-194: the render consumed pipeline-OWNED inputs restored read-only
          # (latest_run.json = LIVE STATE; macro_drivers_snapshot.json = macro
          # fallback). Revert them to HEAD so this hourly run never republishes a file
          # the pipeline owns and can't clobber a newer pipeline copy. Both are tracked
          # on main, so the checkout cleanly un-stages the restored copy; the render
          # has already read it.
          git checkout HEAD -- logs/latest_run.json logs/macro_drivers_snapshot.json

      - name: Check hourly readiness
        if: ${{ success() && steps.freshcheck.outputs.fresh == 'true' }}
        run: python3 scripts/check_readiness.py

      - name: Commit hourly artifacts
        if: ${{ success() && steps.freshcheck.outputs.fresh == 'true' }}
        run: |
          set -euo pipefail
          PRE_SHA=$(git rev-parse HEAD)
          if [ -f logs/last_hourly_slot.json ]; then
            git add -f logs/last_hourly_slot.json
          fi
          # PRD-194 per-file ownership: hourly stages only what it OWNS/regenerates.
          # The pipeline-owned snapshots (market_map.json, latest_run.json,
          # latest_contract.json, latest_payload.json, macro_drivers_snapshot.json) are
          # NOT staged here — the pipeline is their sole publisher. trend_structure is
          # co-produced (hourly writes it too), so it stays.
          git add -f \
            logs/audit.jsonl \
            logs/regime_history.jsonl \
            logs/latest_hourly_market_map.json \
            logs/trend_structure_snapshot.json \
            logs/latest_hourly_run.json \
            logs/latest_hourly_contract.json \
            logs/latest_hourly_payload.json
          git add ui/contract.json ui/dashboard.html ui/index.html
          git diff --staged --quiet || git commit -m "CB hourly: $(date -u +%Y-%m-%dT%H:%MZ)"
          POST_SHA=$(git rev-parse HEAD)
          if [ "$PRE_SHA" = "$POST_SHA" ]; then
            echo "artifact commit: no changes"
          else
            echo "artifact commit: committed changes ($PRE_SHA -> $POST_SHA)"
          fi
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          echo "POST_SHA=$POST_SHA" >> "$GITHUB_ENV"

      - name: Push hourly artifacts
        if: ${{ success() && steps.freshcheck.outputs.fresh == 'true' }}
        run: |
          set -euo pipefail
          bash tools/ci_push_artifacts.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hourly-alert-failure-${{ github.run_number }}
          path: |
            traceback.txt
            logs/latest_contract.json
            logs/latest_hourly_run.json
            logs/latest_hourly_contract.json
            logs/latest_hourly_payload.json
          if-no-files-found: ignore
          retention-days: 7
