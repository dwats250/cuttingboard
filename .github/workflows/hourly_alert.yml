name: Cuttingboard Hourly Alert

on:
  schedule:
    # All times below are UTC (GitHub Actions cron is always UTC).
    # PT equivalents shift with DST; the in-app gate normalises to top of PT hour.
    # Pre-open warm-up: 12:50 UTC (premarket, exempt from slot gate)
    - cron: '50 12 * * 1-5'
    # Pre-open warm-up backup: 12:55 UTC (PRD-144, premarket-exempt, redundancy)
    - cron: '55 12 * * 1-5'
    # Pre-open: 13:00 UTC (premarket, exempt from slot gate) — 6:00 AM PT
    - cron: '0 13 * * 1-5'
    # 6:00 AM PT backup: 13:05 UTC (PRD-144, premarket-exempt, redundancy)
    - cron: '5 13 * * 1-5'
    # ORB window / market open: 13:50 UTC (premarket, exempt from slot gate)
    - cron: '50 13 * * 1-5'
    # Intraday every 30 min: 14:00–21:30 UTC (gate dedups to one alert per PT hour)
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      scheduler:
        description: 'Source of dispatch — operator (manual force-send) or external_cron (route through PRD-141 dedup gate, used by PRD-149 Cloudflare Worker).'
        type: choice
        options:
          - operator
          - external_cron
        default: operator

concurrency:
  group: hourly-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Check Telegram config presence
        run: |
          echo "TELEGRAM_BOT_TOKEN_PRESENT=${{ secrets.TELEGRAM_BOT_TOKEN != '' }}"
          echo "TELEGRAM_CHAT_ID_PRESENT=${{ secrets.TELEGRAM_CHAT_ID != '' }}"

      - name: Run hourly alert
        run: |
          # --force-slot bypasses the PRD-141 slot dedup gate. Only operator
          # manual dispatch should bypass; scheduled events and external_cron
          # dispatch (PRD-149 Cloudflare Worker) route through dedup so
          # redundant firings collapse to one alert per PT hour.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.scheduler }}" != "external_cron" ]; then
            python -m cuttingboard.alert_runner --force-slot
          else
            python -m cuttingboard.alert_runner
          fi

      - name: Render and stage hourly artifacts
        if: ${{ success() }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp logs/latest_hourly_contract.json ui/contract.json
          python3 -m cuttingboard.delivery.dashboard_renderer \
            --payload logs/latest_hourly_payload.json \
            --run logs/latest_hourly_run.json \
            --output ui/dashboard.html
          cp ui/dashboard.html ui/index.html

      - name: Check hourly readiness
        if: ${{ success() }}
        run: python3 scripts/check_readiness.py

      - name: Commit hourly artifacts
        if: ${{ success() }}
        run: |
          set -euo pipefail
          PRE_SHA=$(git rev-parse HEAD)
          if [ -f logs/last_hourly_slot.json ]; then
            git add -f logs/last_hourly_slot.json
          fi
          git add -f \
            logs/audit.jsonl \
            logs/market_map.json \
            logs/macro_drivers_snapshot.json \
            logs/trend_structure_snapshot.json \
            logs/latest_run.json \
            logs/latest_contract.json \
            logs/latest_payload.json \
            logs/latest_hourly_run.json \
            logs/latest_hourly_contract.json \
            logs/latest_hourly_payload.json
          git add ui/contract.json ui/dashboard.html ui/index.html
          git diff --staged --quiet || git commit -m "CB hourly: $(date -u +%Y-%m-%dT%H:%MZ)"
          POST_SHA=$(git rev-parse HEAD)
          if [ "$PRE_SHA" = "$POST_SHA" ]; then
            echo "artifact commit: no changes"
          else
            echo "artifact commit: committed changes ($PRE_SHA -> $POST_SHA)"
          fi
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          echo "POST_SHA=$POST_SHA" >> "$GITHUB_ENV"

      - name: Push hourly artifacts
        if: ${{ success() }}
        run: |
          set -euo pipefail
          bash tools/ci_push_artifacts.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-alert-failure-${{ github.run_number }}
          path: |
            traceback.txt
            logs/latest_contract.json
            logs/latest_hourly_run.json
            logs/latest_hourly_contract.json
            logs/latest_hourly_payload.json
          if-no-files-found: ignore
          retention-days: 7
