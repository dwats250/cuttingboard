name: Cuttingboard Hourly Alert

on:
  schedule:
    # Pre-open warm-up: 12:50 UTC / 8:50 AM ET, Monday–Friday
    - cron: '50 12 * * 1-5'
    # Pre-open: 13:00 UTC / 9:00 AM ET, Monday–Friday
    - cron: '0 13 * * 1-5'
    # ORB window / market open: 13:50 UTC / 9:50 AM ET, Monday–Friday
    - cron: '50 13 * * 1-5'
    # Intraday every 30 min: 14:00–21:30 UTC, Monday–Friday
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:

concurrency:
  group: hourly-alert
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Run hourly alert
        run: python -m cuttingboard.alert_runner

      - name: Publish hourly artifacts
        if: ${{ success() }}
        run: |
          set -eo pipefail
          PRE_SHA=$(git rev-parse HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp logs/latest_hourly_contract.json ui/contract.json
          python3 -m cuttingboard.delivery.dashboard_renderer \
            --payload logs/latest_hourly_payload.json \
            --run logs/latest_hourly_run.json \
            --output ui/dashboard.html
          git add -f logs/latest_hourly_run.json logs/latest_hourly_contract.json logs/latest_hourly_payload.json
          git add ui/contract.json ui/dashboard.html
          git diff --staged --quiet || git commit -m "CB hourly: $(date -u +%Y-%m-%dT%H:%MZ)"
          POST_SHA=$(git rev-parse HEAD)
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          echo "POST_SHA=$POST_SHA" >> "$GITHUB_ENV"

      - name: Push hourly artifacts
        if: ${{ success() }}
        run: |
          set -eo pipefail
          if [ -z "${PRE_SHA:-}" ] || [ -z "${POST_SHA:-}" ]; then
            echo "Missing SHA state - skipping push"
            exit 0
          fi
          if [ "$PRE_SHA" = "$POST_SHA" ]; then
            echo "No new commit - skipping push"
            exit 0
          fi
          git push

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-alert-failure-${{ github.run_number }}
          path: |
            traceback.txt
            logs/latest_contract.json
            logs/latest_hourly_run.json
            logs/latest_hourly_contract.json
            logs/latest_hourly_payload.json
          if-no-files-found: ignore
          retention-days: 7
