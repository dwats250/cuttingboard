name: Cuttingboard Pipeline

on:
  schedule:
    # Premarket: 06:00 PT / 13:00 UTC, Monday–Friday
    - cron: '0 13 * * 1-5'
    # Sunday: 10:00 UTC, regime-only report
    - cron: '0 10 * * 0'
    # Intraday: every 30 minutes from 14:00–21:30 UTC, Monday–Friday
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - sunday
          - verify
          - intraday

# Never cancel a mid-run pipeline — queue instead.
concurrency:
  group: cuttingboard-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
      NTFY_URL:        ${{ secrets.NTFY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Determine run mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "$(date -u +%u)" == "7" ]]; then
            echo "mode=sunday" >> "$GITHUB_OUTPUT"
          elif [[ "$(date -u +%H)" == "13" ]]; then
            echo "mode=live" >> "$GITHUB_OUTPUT"
          else
            echo "mode=intraday" >> "$GITHUB_OUTPUT"
          fi

      # --- Premarket live run (Monday–Friday) ---
      - name: Run live pipeline
        if: steps.mode.outputs.mode == 'live'
        run: python -m cuttingboard --mode live

      # --- Sunday regime-only report ---
      - name: Run Sunday regime report
        if: steps.mode.outputs.mode == 'sunday'
        run: python -m cuttingboard --mode sunday

      # --- Verify: runs after live or sunday, or standalone via workflow_dispatch ---
      - name: Verify run
        if: >-
          steps.mode.outputs.mode == 'live' ||
          steps.mode.outputs.mode == 'sunday' ||
          steps.mode.outputs.mode == 'verify'
        run: python -m cuttingboard --mode verify

      # --- Intraday regime monitor (every 30 min during session) ---
      - name: Run intraday monitor
        if: steps.mode.outputs.mode == 'intraday'
        run: python -m cuttingboard.run_intraday

      # --- Generate commit message from latest_run.json ---
      - name: Generate commit message
        if: >-
          always() &&
          (steps.mode.outputs.mode == 'live' || steps.mode.outputs.mode == 'sunday')
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          p = Path("logs/latest_run.json")
          if not p.exists():
              Path(".cb_commit_msg").write_text("CB run: failed — no summary\n")
              sys.exit(0)

          s = json.loads(p.read_text())
          date_str  = s.get("timestamp", "")[:10]
          regime    = s.get("regime", "UNKNOWN")
          qualified = s.get("candidates_qualified", 0)
          status    = s.get("status", "UNKNOWN")
          chain     = s.get("chain_validation", {})
          symbols   = sorted(
              k for k, v in chain.items()
              if isinstance(v, dict) and v.get("classification") == "TOP_TRADE_VALIDATED"
          )
          msg = f"CB report: {date_str} | {regime} | {qualified} trades [{', '.join(symbols)}] | {status}"
          Path(".cb_commit_msg").write_text(msg + "\n")
          print(msg)
          PY

      # --- Commit all artifacts (always runs so FAIL state is visible in repo) ---
      - name: Commit artifacts
        if: >-
          always() &&
          (steps.mode.outputs.mode == 'live' ||
           steps.mode.outputs.mode == 'sunday' ||
           steps.mode.outputs.mode == 'intraday')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ logs/
          if [ -f .cb_commit_msg ]; then
            git diff --staged --quiet || git commit -F .cb_commit_msg
          else
            git diff --staged --quiet || git commit -m "CB ${{ steps.mode.outputs.mode }}: $(date -u +%Y-%m-%d)"
          fi

      - name: Push
        if: >-
          always() &&
          (steps.mode.outputs.mode == 'live' ||
           steps.mode.outputs.mode == 'sunday' ||
           steps.mode.outputs.mode == 'intraday')
        run: git push
