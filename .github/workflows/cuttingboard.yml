name: Cuttingboard Pipeline

on:
  schedule:
    # Prefetch warm-up: 05:50 PT / 12:50 UTC, Monday–Friday
    - cron: '50 12 * * 1-5'
    # Premarket: 06:00 PT / 13:00 UTC, Monday–Friday
    - cron: '0 13 * * 1-5'
    # Sunday regime-only report: 23:30 UTC (7:30 PM ET, 30 min after futures open)
    - cron: '30 23 * * 0'
    # PRD-189: the ORB (50 13) and intraday (*/30 14-21) crons were removed.
    # Those slots ran the full live pipeline via cli_main, which is NOT their
    # intended notify path (_execute_notify_run); the intraday window is already
    # covered by hourly_alert.yml. Correctly homing orb_trajectory / post_orb /
    # midmorning / power_hour is deferred to a follow-up PRD (see PROJECT_STATE).
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - sunday
          - verify
          - prefetch

# Never cancel a mid-run pipeline — queue instead.
# Per-workflow self-serialization (prevents two pipeline runs overlapping).
# PRD-194: cross-workflow publish races to the `publish` branch are handled by
# ci_push_artifacts.sh's delta-append + bounded push-retry, NOT a shared lock — a
# shared group over-serialized the time-sensitive hourly alert (Codex P2).
concurrency:
  group: cuttingboard-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    timeout-minutes: 20
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      # PRD-194: artifacts publish to this unprotected branch, not main.
      PUBLISH_BRANCH: publish
      # Static-analysis default so the VS Code GitHub Actions extension can
      # resolve env.PUBLISH_READY in the commit/push `if:` gates below. At
      # runtime each per-mode step exports PUBLISH_READY through the GITHUB_ENV
      # file; a step's GITHUB_ENV write takes precedence over a job-level env
      # default for all subsequent steps, so the runtime value still wins.
      # Safe fallback: 'false' matches today's behavior when no run step sets it.
      PUBLISH_READY: 'false'

    steps:
      # PRD-194: pin to main. workflow_dispatch can be triggered from any branch;
      # publishing now targets the UNPROTECTED `publish` branch, so an unpinned
      # checkout would let a dispatch on a feature branch publish that branch's
      # rendered ui/logs to production. Scheduled runs already run on main.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # PRD-189: resolve the slot in scripts/resolve_run_mode.py (stdlib-only,
      # unit-tested). It keys on github.event.schedule (the cron string), not
      # wall-clock minutes, so a queue-delayed run still resolves to its slot
      # (the old exact-minute match resolved every late run to noop). Scope is
      # the dedicated premarket crons (prefetch/live/sunday); intraday/orb are
      # deferred to a follow-up PRD (see PROJECT_STATE).
      - name: Determine run mode
        id: mode
        env:
          CB_EVENT_NAME: ${{ github.event_name }}
          CB_DISPATCH_MODE: ${{ github.event.inputs.mode }}
          CB_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -eo pipefail
          job_mode="$(python3 scripts/resolve_run_mode.py)"
          echo "job_mode=$job_mode" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $job_mode"

      # PRD-193: persist the OHLCV warm-up cache (data/cache) across the ephemeral
      # runners so the 12:50 prefetch run warms it and the 13:00 live run reads it
      # warm instead of re-fetching ~12 months of daily bars per symbol. Keyed on
      # the UTC trading day; restore-keys prefix-falls back to the most recent
      # prior-day cache (safe -- the trading-day freshness check re-validates and
      # re-fetches anything that is not the most recent completed session). Only
      # the cache-warming modes touch the key.
      - name: OHLCV cache day key
        id: ohlcvcache
        if: >-
          steps.mode.outputs.job_mode == 'prefetch' ||
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday'
        run: echo "day=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore OHLCV cache
        if: >-
          steps.mode.outputs.job_mode == 'prefetch' ||
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday'
        uses: actions/cache/restore@v4
        with:
          path: data/cache
          key: ohlcv-${{ runner.os }}-${{ steps.ohlcvcache.outputs.day }}
          restore-keys: |
            ohlcv-${{ runner.os }}-

      # PRD-194 R3: restore the accumulated/read-back state the pipeline carries on
      # the publish branch (main's copies are frozen post-decoupling):
      #   - logs/audit.jsonl: the accumulating scoreboard source (delta-appended).
      #   - logs/evaluation.jsonl: the append-only post-trade evaluation log
      #     (run_post_trade_evaluation, force-published via `git add -f logs/`).
      #     Single-writer + serialized, so restore + overwrite is enough (no delta).
      #   - logs/last_notification_state.json: _run_pipeline's notification dedup key
      #     (load_last_state -> should_send). Without it the next scheduled run
      #     re-sends an unchanged LOW/MEDIUM Telegram alert (Codex P2).
      #   - logs/market_map.json: the prior-run lifecycle baseline _run_pipeline reads
      #     via _load_previous_market_map() -> inject_lifecycle(). Pipeline OWNS and
      #     republishes it; without restore, lifecycle badges/removed_symbols are
      #     computed against main's frozen snapshot -> bogus NEW/REMOVED (Codex P2).
      #   - 'logs/run_*.json': the accumulating per-run archive (immutable per file)
      #     the renderer globs for "Changes Since Last Run" + history. Frozen on main
      #     => deltas computed against a pre-decoupling run (Codex P2). Quoted so the
      #     glob reaches the restore helper, not the workflow shell. Pipeline-owned.
      #   - logs/latest_hourly_contract.json: HOURLY-owned, but the renderer's
      #     _load_contract_entry_context reads it for the dashboard's contract entry
      #     prices on the PIPELINE render too. READ-ONLY — reverted to HEAD after the
      #     render so the pipeline never republishes the hourly's mutable contract
      #     (closure-sweep finding, same class as hourly's latest_run read-only).
      #   - logs/regime_history.jsonl: the published scoreboard (PRD-204). RESTORED so
      #     the Commit step's Aggregate can PRESERVE an already-published
      #     spy_close_change_pct it cannot recompute this run (SPY parquet absent)
      #     instead of wiping it to null. Aggregate still rebuilds rows from audit;
      #     restore only supplies the prior values it would otherwise lose. Without it
      #     preserve-prior reads main's frozen 3-row fallback and the wipe still happens.
      # The restore step also records CB_PUBLISH_BASE_SHA for the audit delta-append.
      # Only the publishing modes need it.
      - name: Restore publish state
        if: >-
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday' ||
          steps.mode.outputs.job_mode == 'verify'
        run: bash tools/ci_restore_publish_state.sh logs/audit.jsonl logs/evaluation.jsonl logs/last_notification_state.json logs/market_map.json logs/latest_hourly_contract.json logs/regime_history.jsonl 'logs/run_*.json'

      - name: Install dev dependencies
        run: |
          set -eo pipefail
          pip install -e ".[dev]"

      - name: Lint
        run: |
          set -eo pipefail
          ruff check cuttingboard/ tests/

      - name: Test
        run: |
          set -eo pipefail
          pytest tests/ -q

      - name: Engine health check
        run: |
          set -eo pipefail
          python3 tools/engine_doctor.py --json --baseline tools/baseline.json > engine_doctor.json || true
          python3 tools/engine_doctor.py --baseline tools/baseline.json > engine_doctor.txt 2>&1 || true

      - name: Upload engine doctor artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: engine-doctor-${{ github.run_id }}
          path: |
            engine_doctor.json
            engine_doctor.txt

      # --- Prefetch warm-up (PRD-193: cache-warm only, publish-safe) ---
      # The 50 12 prefetch cron resolves to `prefetch` (resolve_run_mode.py). This
      # step warms the OHLCV cache (data/cache) and nothing else: it sets NO
      # PUBLISH_READY, so Commit-artifacts/Push are skipped and it cannot trip the
      # PRD-119 freshness gate (execute_prefetch writes no fresh payload/run and
      # sends no notification). "Save OHLCV cache" below persists the warmed cache
      # so the 13:00 live run reads it warm.
      - name: Run prefetch
        if: steps.mode.outputs.job_mode == 'prefetch'
        run: |
          set -eo pipefail
          echo "=== START prefetch ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          timeout 8m python -m cuttingboard --mode prefetch --notify-mode premarket
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== END prefetch ==="

      # PRD-193 (Codex P2-1): execute_prefetch returns 0 even when a market-stress
      # halt skips compute_all_derived (so no OHLCV is warmed). Gating the save on
      # job_mode alone would persist a cold/prior-day cache under the immutable day
      # key and defeat the live reuse (PRD-198 #2: assert the RESOLVED effect, not
      # the requested action). Prove the cache actually holds a fresh bar -- with
      # the same _is_fresh_ohlcv_cache the engine uses -- before saving. Failure to
      # prove freshness resolves to `false` (do not poison the key), which is an
      # honest non-result, not a silent success (PRD-198 #1).
      - name: Check OHLCV cache warmed
        id: warmed
        if: steps.mode.outputs.job_mode == 'prefetch'
        run: |
          set -eo pipefail
          warmed=$(python3 -c "import glob,pandas as pd;from cuttingboard.ingestion import _is_fresh_ohlcv_cache as F;print('true' if any(F(pd.read_parquet(f)) for f in glob.glob('data/cache/*_ohlcv.parquet')) else 'false')" 2>/dev/null || echo false)
          echo "ohlcv_warmed=$warmed" >> "$GITHUB_OUTPUT"
          echo "OHLCV cache warmed (fresh bar present): $warmed"

      # PRD-193: persist the just-warmed OHLCV cache under the trading-day key so
      # the 13:00 live run (a fresh runner) restores it. Only the prefetch run
      # saves -- the producer -- and only when it actually warmed a fresh cache,
      # so the immutable day key is never owned by a cold/halted run.
      - name: Save OHLCV cache
        if: steps.mode.outputs.job_mode == 'prefetch' && steps.warmed.outputs.ohlcv_warmed == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/cache
          key: ohlcv-${{ runner.os }}-${{ steps.ohlcvcache.outputs.day }}

      # --- Premarket full pipeline ---
      - name: Run live pipeline
        if: steps.mode.outputs.job_mode == 'live'
        run: |
          set -eo pipefail
          echo "=== START live ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          timeout 8m python -m cuttingboard --mode live --notify-mode premarket
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== END live ==="
          echo "PUBLISH_READY=true" >> "$GITHUB_ENV"

      # --- Sunday regime-only report ---
      - name: Run Sunday regime report
        if: steps.mode.outputs.job_mode == 'sunday'
        run: |
          set -eo pipefail
          echo "=== START sunday ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          timeout 8m python -m cuttingboard --mode sunday --notify-mode premarket
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== END sunday ==="
          echo "PUBLISH_READY=true" >> "$GITHUB_ENV"

      # --- Verify: runs after live or sunday, or standalone via workflow_dispatch ---
      - name: Verify run
        if: >-
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday' ||
          steps.mode.outputs.job_mode == 'verify'
        run: |
          set -eo pipefail
          echo "=== START verify ==="
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          timeout 8m python -m cuttingboard --mode verify --notify-mode premarket
          date -u +"%Y-%m-%dT%H:%M:%SZ"
          echo "=== END verify ==="
          # PRD-194 (Codex P2): verify mode VALIDATES only — it does NOT regenerate the
          # latest_run/payload/contract snapshots, so it must NOT publish (it would push a
          # dashboard rendered from main's frozen snapshots). PUBLISH_READY stays 'false'
          # for a verify-only dispatch; live/sunday set it true in their own Run steps
          # above (publish is still gated on this verify step succeeding via `if: success()`).

      # PRD-189: orb_trajectory / post_orb / midmorning / power_hour dispatch
      # steps were removed — they invoked the full live pipeline via cli_main
      # (not their intended _execute_notify_run path) and the intraday window is
      # already covered by hourly_alert.yml. Re-homing them is a follow-up PRD.

      # --- Generate commit message from latest_run.json (live and sunday only) ---
      - name: Generate commit message
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' || steps.mode.outputs.job_mode == 'sunday')
        run: |
          set -eo pipefail
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          p = Path("logs/latest_run.json")
          if not p.exists():
              Path(".cb_commit_msg").write_text("CB run: failed — no summary\n")
              sys.exit(1)

          s = json.loads(p.read_text())
          date_str  = s.get("timestamp", "")[:10]
          regime    = s.get("regime", "UNKNOWN")
          qualified = s.get("candidates_qualified", 0)
          status    = s.get("status", "UNKNOWN")
          chain     = s.get("chain_validation", {})
          symbols   = sorted(
              k for k, v in chain.items()
              if isinstance(v, dict) and v.get("classification") == "TOP_TRADE_VALIDATED"
          )
          msg = f"CB report: {date_str} | {regime} | {qualified} trades [{', '.join(symbols)}] | {status}"
          Path(".cb_commit_msg").write_text(msg + "\n")
          print(msg)
          PY

      # --- Commit artifacts (live and sunday write reports/logs) ---
      - name: Commit artifacts
        if: ${{ success() && env.PUBLISH_READY == 'true' }}
        run: |
          set -euo pipefail
          PRE_SHA=$(git rev-parse HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # PRD-189: refresh the scoreboard from this run's just-written audit
          # row BEFORE staging logs/ and rendering, so SCOREBOARD age reflects the
          # scheduled run immediately (not only on a later hourly publish). Same
          # read-only aggregator hourly_alert.yml uses; writes only
          # logs/regime_history.jsonl, no runtime/notify coupling (PRD-175 R5).
          python3 -m cuttingboard.delivery.regime_history
          git add reports/ || true
          git add -f logs/ || true
          cp logs/latest_contract.json ui/contract.json 2>/dev/null || true
          git add ui/contract.json || true
          python3 -m cuttingboard.delivery.dashboard_renderer --output ui/dashboard.html
          cp ui/dashboard.html ui/index.html
          git add ui/dashboard.html ui/index.html
          # PRD-194 (closure sweep): the render consumed HOURLY-owned
          # latest_hourly_contract.json (entry prices) restored read-only. Revert it to
          # HEAD so the pipeline never republishes the hourly's mutable contract (the
          # hourly owns + publishes it); tracked on main, so checkout cleanly unstages.
          git checkout HEAD -- logs/latest_hourly_contract.json
          if [ -f .cb_commit_msg ]; then
            git diff --staged --quiet || git commit -F .cb_commit_msg
          else
            git diff --staged --quiet || git commit -m "CB ${{ steps.mode.outputs.job_mode }}: $(date -u +%Y-%m-%d)"
          fi
          POST_SHA=$(git rev-parse HEAD)
          if [ "$PRE_SHA" = "$POST_SHA" ]; then
            echo "artifact commit: no changes"
          else
            echo "artifact commit: committed changes ($PRE_SHA -> $POST_SHA)"
          fi
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          echo "POST_SHA=$POST_SHA" >> "$GITHUB_ENV"

      # PRD-194 (Codex P1): the ref guard blocks a non-main workflow_dispatch from
      # PUBLISHING to the unprotected branch (a branch dispatch can still run the
      # pipeline for testing — it just won't push). Residual: an attacker who edits
      # this workflow on their branch can drop the guard; that is closed only by
      # out-of-tree governance (branch protection / CODEOWNERS on .github/workflows).
      - name: Push
        if: ${{ success() && env.PUBLISH_READY == 'true' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          bash tools/ci_push_artifacts.sh
