name: Cuttingboard Pipeline

on:
  schedule:
    # Prefetch warm-up: 05:50 PT / 12:50 UTC, Monday–Friday
    - cron: '50 12 * * 1-5'
    # Premarket: 06:00 PT / 13:00 UTC, Monday–Friday
    - cron: '0 13 * * 1-5'
    # ORB trajectory: 06:50 PT / 13:50 UTC, Monday–Friday
    - cron: '50 13 * * 1-5'
    # Sunday regime-only report: 10:00 UTC
    - cron: '0 10 * * 0'
    # Intraday monitor + post-ORB/mid-morning/power-hour: every 30 min 14:00–21:30 UTC Mon–Fri
    # Time-based routing below maps 14:30→post_orb, 16:30→midmorning, 19:00→power_hour
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - sunday
          - verify
          - intraday
          - prefetch
          - orb_trajectory
          - post_orb
          - midmorning
          - power_hour

# Never cancel a mid-run pipeline — queue instead.
concurrency:
  group: cuttingboard-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
      NTFY_URL:        ${{ secrets.NTFY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          set -euo pipefail
          pip install -e .

      - name: Determine run mode
        id: mode
        run: |
          set -euo pipefail
          TIME=$(date -u +%H%M)
          EVENT="${{ github.event_name }}"
          DISPATCH_MODE="${{ github.event.inputs.mode }}"

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            job_mode="$DISPATCH_MODE"
          elif [[ "$(date -u +%u)" == "7" ]]; then
            job_mode="sunday"
          elif [[ "$TIME" == "1250" ]]; then
            job_mode="prefetch"
          elif [[ "$TIME" == "1300" ]]; then
            job_mode="live"
          elif [[ "$TIME" == "1350" ]]; then
            job_mode="orb_trajectory"
          elif [[ "$TIME" == "1430" ]]; then
            job_mode="post_orb"
          elif [[ "$TIME" == "1630" ]]; then
            job_mode="midmorning"
          elif [[ "$TIME" == "1900" ]]; then
            job_mode="power_hour"
          elif [[ "$TIME" == "2000" ]]; then
            job_mode="power_hour"
          else
            job_mode="intraday"
          fi

          echo "job_mode=$job_mode" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $job_mode"

      # --- Prefetch warm-up ---
      - name: Run prefetch
        if: steps.mode.outputs.job_mode == 'prefetch'
        run: |
          set -euo pipefail
          echo "=== START PREFETCH ==="
          python -m cuttingboard --mode prefetch
          echo "=== END PREFETCH ==="

      # --- Premarket full pipeline ---
      - name: Run live pipeline
        if: steps.mode.outputs.job_mode == 'live'
        run: |
          set -euo pipefail
          echo "=== START LIVE ==="
          python -m cuttingboard --mode live --notify-mode premarket
          echo "=== END LIVE ==="

      # --- Sunday regime-only report ---
      - name: Run Sunday regime report
        if: steps.mode.outputs.job_mode == 'sunday'
        run: |
          set -euo pipefail
          echo "=== START SUNDAY ==="
          python -m cuttingboard --mode sunday
          echo "=== END SUNDAY ==="

      # --- Verify: runs after live or sunday, or standalone via workflow_dispatch ---
      - name: Verify run
        if: >-
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday' ||
          steps.mode.outputs.job_mode == 'verify'
        run: |
          set -euo pipefail
          echo "=== START VERIFY ==="
          python -m cuttingboard --mode verify
          echo "=== END VERIFY ==="

      # --- ORB trajectory: 06:50 PT ---
      - name: Run ORB trajectory scan
        if: steps.mode.outputs.job_mode == 'orb_trajectory'
        run: |
          set -euo pipefail
          echo "=== START ORB_TRAJECTORY ==="
          python -m cuttingboard --mode live --notify-mode orb_trajectory
          echo "=== END ORB_TRAJECTORY ==="

      # --- Post-ORB: 07:30 PT ---
      - name: Run post-ORB scan
        if: steps.mode.outputs.job_mode == 'post_orb'
        run: |
          set -euo pipefail
          echo "=== START POST_ORB ==="
          python -m cuttingboard --mode live --notify-mode post_orb
          echo "=== END POST_ORB ==="

      # --- Mid-morning: 09:30 PT ---
      - name: Run mid-morning scan
        if: steps.mode.outputs.job_mode == 'midmorning'
        run: |
          set -euo pipefail
          echo "=== START MIDMORNING ==="
          python -m cuttingboard --mode live --notify-mode midmorning
          echo "=== END MIDMORNING ==="

      # --- Power hour: 12:00 PT (3:00 PM ET) ---
      - name: Run power-hour scan
        if: steps.mode.outputs.job_mode == 'power_hour'
        run: |
          set -euo pipefail
          echo "=== START POWER_HOUR ==="
          python -m cuttingboard --mode live --notify-mode power_hour
          echo "=== END POWER_HOUR ==="

      # --- Intraday regime monitor (event-driven, every 30 min during session) ---
      - name: Run intraday monitor
        if: steps.mode.outputs.job_mode == 'intraday'
        run: |
          set -euo pipefail
          echo "=== START INTRADAY ==="
          python -m cuttingboard.run_intraday
          echo "=== END INTRADAY ==="

      # --- Generate commit message from latest_run.json (live and sunday only) ---
      - name: Generate commit message
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' || steps.mode.outputs.job_mode == 'sunday')
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          p = Path("logs/latest_run.json")
          if not p.exists():
              Path(".cb_commit_msg").write_text("CB run: failed — no summary\n")
              sys.exit(1)

          s = json.loads(p.read_text())
          date_str  = s.get("timestamp", "")[:10]
          regime    = s.get("regime", "UNKNOWN")
          qualified = s.get("candidates_qualified", 0)
          status    = s.get("status", "UNKNOWN")
          chain     = s.get("chain_validation", {})
          symbols   = sorted(
              k for k, v in chain.items()
              if isinstance(v, dict) and v.get("classification") == "TOP_TRADE_VALIDATED"
          )
          msg = f"CB report: {date_str} | {regime} | {qualified} trades [{', '.join(symbols)}] | {status}"
          Path(".cb_commit_msg").write_text(msg + "\n")
          print(msg)
          PY

      # --- Commit artifacts (live and sunday write reports/logs; intraday writes logs) ---
      - name: Commit artifacts
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' ||
           steps.mode.outputs.job_mode == 'sunday' ||
           steps.mode.outputs.job_mode == 'intraday')
        run: |
          set -euo pipefail
          PRE_SHA=$(git rev-parse HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ logs/
          if [ -f .cb_commit_msg ]; then
            git diff --staged --quiet || git commit -F .cb_commit_msg
          else
            git diff --staged --quiet || git commit -m "CB ${{ steps.mode.outputs.job_mode }}: $(date -u +%Y-%m-%d)"
          fi
          POST_SHA=$(git rev-parse HEAD)
          echo "PRE_SHA=$PRE_SHA" >> "$GITHUB_ENV"
          echo "POST_SHA=$POST_SHA" >> "$GITHUB_ENV"

      - name: Push
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' ||
           steps.mode.outputs.job_mode == 'sunday' ||
           steps.mode.outputs.job_mode == 'intraday')
        run: |
          set -euo pipefail
          if [ "$PRE_SHA" = "$POST_SHA" ]; then
            echo "No new commit — skipping push"
            exit 0
          fi

          git push
