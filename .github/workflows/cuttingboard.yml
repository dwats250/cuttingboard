name: Cuttingboard Pipeline

on:
  schedule:
    # Prefetch warm-up: 05:50 PT / 12:50 UTC, Monday–Friday
    - cron: '50 12 * * 1-5'
    # Premarket: 06:00 PT / 13:00 UTC, Monday–Friday
    - cron: '0 13 * * 1-5'
    # ORB trajectory: 06:50 PT / 13:50 UTC, Monday–Friday
    - cron: '50 13 * * 1-5'
    # Sunday regime-only report: 10:00 UTC
    - cron: '0 10 * * 0'
    # Intraday monitor + post-ORB/mid-morning/power-hour: every 30 min 14:00–21:30 UTC Mon–Fri
    # Time-based routing below maps 14:30→post_orb, 16:30→midmorning, 19:00→power_hour
    - cron: '*/30 14-21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'live'
        type: choice
        options:
          - live
          - sunday
          - verify
          - intraday
          - prefetch
          - orb_trajectory
          - post_orb
          - midmorning
          - power_hour

# Never cancel a mid-run pipeline — queue instead.
concurrency:
  group: cuttingboard-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
      NTFY_URL:        ${{ secrets.NTFY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Determine run mode
        id: mode
        run: |
          TIME=$(date -u +%H%M)
          EVENT="${{ github.event_name }}"
          DISPATCH_MODE="${{ github.event.inputs.mode }}"

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "job_mode=$DISPATCH_MODE" >> "$GITHUB_OUTPUT"
          elif [[ "$(date -u +%u)" == "7" ]]; then
            echo "job_mode=sunday" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1250" ]]; then
            echo "job_mode=prefetch" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1300" ]]; then
            echo "job_mode=live" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1350" ]]; then
            echo "job_mode=orb_trajectory" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1430" ]]; then
            echo "job_mode=post_orb" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1630" ]]; then
            echo "job_mode=midmorning" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "1900" ]]; then
            echo "job_mode=power_hour" >> "$GITHUB_OUTPUT"
          elif [[ "$TIME" == "2000" ]]; then
            echo "job_mode=power_hour" >> "$GITHUB_OUTPUT"
          else
            echo "job_mode=intraday" >> "$GITHUB_OUTPUT"
          fi

      # --- Prefetch warm-up ---
      - name: Run prefetch
        if: steps.mode.outputs.job_mode == 'prefetch'
        run: python -m cuttingboard --mode prefetch

      # --- Premarket full pipeline ---
      - name: Run live pipeline
        if: steps.mode.outputs.job_mode == 'live'
        run: python -m cuttingboard --mode live --notify-mode premarket

      # --- Sunday regime-only report ---
      - name: Run Sunday regime report
        if: steps.mode.outputs.job_mode == 'sunday'
        run: python -m cuttingboard --mode sunday

      # --- Verify: runs after live or sunday, or standalone via workflow_dispatch ---
      - name: Verify run
        if: >-
          steps.mode.outputs.job_mode == 'live' ||
          steps.mode.outputs.job_mode == 'sunday' ||
          steps.mode.outputs.job_mode == 'verify'
        run: python -m cuttingboard --mode verify

      # --- ORB trajectory: 06:50 PT ---
      - name: Run ORB trajectory scan
        if: steps.mode.outputs.job_mode == 'orb_trajectory'
        run: python -m cuttingboard --mode live --notify-mode orb_trajectory

      # --- Post-ORB: 07:30 PT ---
      - name: Run post-ORB scan
        if: steps.mode.outputs.job_mode == 'post_orb'
        run: python -m cuttingboard --mode live --notify-mode post_orb

      # --- Mid-morning: 09:30 PT ---
      - name: Run mid-morning scan
        if: steps.mode.outputs.job_mode == 'midmorning'
        run: python -m cuttingboard --mode live --notify-mode midmorning

      # --- Power hour: 12:00 PT (3:00 PM ET) ---
      - name: Run power-hour scan
        if: steps.mode.outputs.job_mode == 'power_hour'
        run: python -m cuttingboard --mode live --notify-mode power_hour

      # --- Intraday regime monitor (event-driven, every 30 min during session) ---
      - name: Run intraday monitor
        if: steps.mode.outputs.job_mode == 'intraday'
        run: python -m cuttingboard.run_intraday

      # --- Generate commit message from latest_run.json (live and sunday only) ---
      - name: Generate commit message
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' || steps.mode.outputs.job_mode == 'sunday')
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          p = Path("logs/latest_run.json")
          if not p.exists():
              Path(".cb_commit_msg").write_text("CB run: failed — no summary\n")
              sys.exit(0)

          s = json.loads(p.read_text())
          date_str  = s.get("timestamp", "")[:10]
          regime    = s.get("regime", "UNKNOWN")
          qualified = s.get("candidates_qualified", 0)
          status    = s.get("status", "UNKNOWN")
          chain     = s.get("chain_validation", {})
          symbols   = sorted(
              k for k, v in chain.items()
              if isinstance(v, dict) and v.get("classification") == "TOP_TRADE_VALIDATED"
          )
          msg = f"CB report: {date_str} | {regime} | {qualified} trades [{', '.join(symbols)}] | {status}"
          Path(".cb_commit_msg").write_text(msg + "\n")
          print(msg)
          PY

      # --- Commit artifacts (live and sunday write reports/logs; intraday writes logs) ---
      - name: Commit artifacts
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' ||
           steps.mode.outputs.job_mode == 'sunday' ||
           steps.mode.outputs.job_mode == 'intraday')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ logs/
          if [ -f .cb_commit_msg ]; then
            git diff --staged --quiet || git commit -F .cb_commit_msg
          else
            git diff --staged --quiet || git commit -m "CB ${{ steps.mode.outputs.job_mode }}: $(date -u +%Y-%m-%d)"
          fi

      - name: Push
        if: >-
          always() &&
          (steps.mode.outputs.job_mode == 'live' ||
           steps.mode.outputs.job_mode == 'sunday' ||
           steps.mode.outputs.job_mode == 'intraday')
        run: git push
