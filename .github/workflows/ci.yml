name: CI

# Isolated lint+test merge gate. Independent of the operational pipeline
# (cuttingboard.yml): it uses no repository secrets and performs no artifact
# commit, publish, or push. Guards PRs and pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python tools/validate_prd_registry.py
      - run: pip install -e ".[dev]"
      - run: ruff check cuttingboard/ tests/
      - run: pytest tests/ -q
