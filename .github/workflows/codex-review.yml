name: Codex cross-review

# PRD-197 — host-independent Codex cross-review (the PRD-#21 gate artifact in CI).
# PRD-207 — the gate certifies the REQUESTED model was HONORED (no silent codex
#   fallback), read from the COMPLETED review job's --json JSONL log. There is no
#   structured served-model field on this toolchain (codex CLI emits none; the
#   action surfaces only the prose final-message), so the gate keys on codex's
#   STRUCTURED item.error fallback event — never the prose self-report, never the
#   requested input as a proxy, never the session rollout (PRD-198 #2/#3). See
#   docs/prd_history/PRD-207.md (AMENDMENT: verdict CONFIRMED-PROSE-ONLY).
#
# SECURITY (HIGH-RISK, public repo):
#   * Dispatch-only. NEVER add `pull_request` / `pull_request_target`: a fork run
#     would expose OPENAI_API_KEY to untrusted code.
#   * OPENAI_API_KEY is consumed ONLY as the `openai-api-key` input of the
#     official openai/codex-action, which proxies it. It is NEVER a job/step
#     `env:` and is NEVER echoed. The honor gate reads the GitHub job-log API, it
#     does NOT run codex in a `run:` step, so the secret-proxy model is preserved.
#   * Three-job split: `review` holds the key (proxied) with contents:read ONLY and
#     cannot write; `resolve` never sees the key (actions:read, reads the completed
#     review job log + assembles the artifact, fail-closed); `land` never sees the
#     key and only pushes the artifact to a durable codex-review/* branch.
#   * `land` NEVER pushes to a protected branch (e.g. main) and NEVER opens or
#     auto-merges a PR. It pushes the artifact to a durable codex-review/* branch
#     (rooted at the base, so artifact-only) and stops; a human opens the PR at the
#     seam so ci.yml runs and the merge stays a human decision (PRD-184/PRD-194).
#
# Supply-chain: `openai/codex-action` is pinned to a commit SHA (v1.8) at the
# review step below. `codex-version` is intentionally left unpinned there so the
# action installs a current sandbox-capable Codex CLI.

on:
  workflow_dispatch:
    inputs:
      prd:
        description: "Target PRD number (e.g. 197)"
        required: true
        type: string
      sha:
        description: "Head SHA of the target branch to review (pinned; the artifact is tied to this)"
        required: true
        type: string
      base:
        description: "Base branch the artifact PR targets (default main). The artifact ALWAYS lands via a CI-gated PR, never a direct push."
        required: false
        default: main
        type: string
      pr:
        description: "Target PR number (provenance/context; optional)"
        required: false
        type: string
      model:
        description: "REQUESTED Codex model id. The gate certifies this model was HONORED (no codex fallback) and records it as resolved-model only when honored and allowlisted; a silent fallback fails the gate closed (PRD-207)."
        required: false
        default: gpt-5-codex
        type: string

# No permissions by default; each job opts in to least privilege.
permissions: {}

# Property-#3 (PRD-#21 "verified-real Codex") allowlist — HUMAN-CONFIGURABLE.
# When the requested model is HONORED, it is recorded as resolved-model and must
# match one of these space-separated shell globs, or the review is marked INVALID
# and NO artifact is emitted (fail-closed). Sourced from the repository variable
# vars.ALLOWED_CODEX_MODELS (Settings → Secrets and variables → Actions →
# Variables), NOT a committed literal — a hardcoded model id would re-open the
# fail-closed default and is rejected by the gate contract test. UNSET ⇒ empty ⇒
# every model rejected until a human authorizes genuine Codex model id(s) in the
# repo variable (e.g. "gpt-5-codex gpt-5-codex-*").
env:
  ALLOWED_CODEX_MODELS: ${{ vars.ALLOWED_CODEX_MODELS }}

concurrency:
  group: codex-review-${{ inputs.prd }}-${{ inputs.sha }}
  cancel-in-progress: false

jobs:
  # --- review: holds the key (via the action proxy), READ-ONLY, cannot write.
  #     Emits the --json JSONL to its job log (read post-hoc by `resolve`) and
  #     uploads the prose final-message for downstream assembly. ---
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      codex-version: ${{ steps.codexver.outputs.version }}
    steps:
      - name: Checkout target branch at the pinned SHA (fresh context)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - name: Codex cross-review (read-only; key proxied by the action)
        id: codex
        uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1 # v1.8 (pinned)
        with:
          # Secret consumed only here, as the action input it proxies — never an env: var.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          model: ${{ inputs.model }}
          # Emit the JSONL event stream so codex's STRUCTURED fallback item.error
          # (the honor signal) lands in this job's log for `resolve` to read.
          codex-args: --json
          # codex-version PINNED (PRD-212): the floating "current" CLI dropped
          # `gpt-5-codex` metadata and fell back, fail-closing every dispatch.
          # 0.142.1 is the last CLI with landed proof (PRD-210/PRD-208 certified
          # artifacts) of honoring the alias, and is >0.2.x so `sandbox: read-only`
          # stays enforceable. The runtime `codex --version` capture below stays
          # for provenance. Any change here needs a fresh Phase-4 live re-validation.
          codex-version: 0.142.1
          working-directory: ${{ github.workspace }}
          output-file: codex-final-message.md
          allow-users: dwats250
          prompt: |
            You are performing an INDEPENDENT Codex cross-review of PRD-${{ inputs.prd }}
            for the Cuttingboard repository, reviewing the checked-out target branch at
            commit ${{ inputs.sha }} with fresh context (no prior authoring conversation).

            Read docs/prd_history/PRD-${{ inputs.prd }}.md, VISION.md, CLAUDE.md, and the
            files the PRD touches. Produce a structured review:
              - VERDICT: APPROVE / APPROVE WITH EDITS / REQUEST CHANGES
              - REQUIRED EDITS (blocking)
              - RECOMMENDED EDITS (non-blocking)
              - RATIONALE
              - DRIFT CHECK: does the change conflict with a VISION.md non-goal/principle,
                and does it leave any docs/PROJECT_STATE.md claim stale?
            State explicitly which Codex model you are running as.

      - name: Capture codex CLI version (provenance; no secret involved)
        id: codexver
        run: |
          set -euo pipefail
          echo "version=$(codex --version 2>/dev/null || echo 'unknown')" >> "${GITHUB_OUTPUT}"

      - name: Upload codex prose final-message for downstream assembly
        uses: actions/upload-artifact@v7
        with:
          name: codex-final-message-${{ inputs.prd }}
          path: codex-final-message.md
          if-no-files-found: error

  # --- resolve: NEVER sees the key. Reads the COMPLETED review job's --json log
  #     via the GitHub API (own-log flush-safe: review has finished), classifies
  #     model honor (fail-closed), and assembles the artifact with a single model
  #     identity. No artifact is produced unless the requested model was honored
  #     and allowlisted. ---
  resolve:
    needs: review
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Fetch the completed review job log + classify model honor (fail-closed)
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL: ${{ inputs.model }}
        run: |
          set -euo pipefail
          # The review job has completed (needs: review), so its log is flush-safe
          # via the API — unlike a job's own still-running log.
          job_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" --paginate -q '.jobs[] | select(.name=="review") | .id' | head -n1)"
          if [ -z "${job_id}" ]; then echo "::error::could not find the review job id (fail-closed)"; exit 1; fi
          gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > job.log || true
          if [ ! -s job.log ]; then
            curl -sL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" -o job.log || true
          fi
          if [ ! -s job.log ]; then echo "::error::review job log unreadable (fail-closed)"; exit 1; fi
          cat > resolve_model.py <<'PY'
          # === RESOLVER BEGIN (extractable; tests/test_codex_review.py runs this against real fixtures) ===
          # PRD-207 honor gate. Certify the REQUESTED model was HONORED (no silent
          # codex fallback) from the --json JSONL. There is NO structured served-model
          # field on this toolchain, so we DO NOT read a served model id. We FAIL
          # CLOSED on: codex's structured item.error fallback event, any unrecognized
          # item.error, an unparseable/unrecognized stream, and a stream with no
          # turn.completed (PRD-198 #1 fail-loud, #3 authoritative-source). Resolution
          # NEVER reads the prose final-message, the requested input as a proxy, or the
          # session rollout. A reworded fallback message still trips on item.type==error,
          # so a reword can never pass as honored.
          import json, re, sys, fnmatch
          KNOWN_EVENT_TYPES = {
              "thread.started", "turn.started", "turn.completed",
              "item.started", "item.completed", "item.updated", "error",
          }
          # Pinned to the captured item_0 message at job 83746430244 (diagnostic only;
          # ANY item.error fails closed regardless of this pattern).
          FALLBACK_RE = re.compile(r"model metadata for .* not found", re.IGNORECASE)
          def parse_events(text):
              events = []
              for raw in text.splitlines():
                  s = raw.strip()
                  i = s.find("{")
                  if i < 0:
                      continue
                  try:
                      obj = json.loads(s[i:])
                  except Exception:
                      continue
                  if isinstance(obj, dict) and "type" in obj:
                      events.append(obj)
              return events
          def classify(text, requested, allowlist):
              events = parse_events(text)
              codex = [e for e in events if e.get("type") in KNOWN_EVENT_TYPES]
              if not codex:
                  return (2, None, "no recognized codex JSONL events (unparseable/unrecognized stream)")
              if not any(e.get("type") == "turn.completed" for e in codex):
                  return (3, None, "no turn.completed event (incomplete/unrecognized stream)")
              for e in codex:
                  if e.get("type") == "item.completed":
                      item = e.get("item") or {}
                      if item.get("type") == "error":
                          msg = str(item.get("message", ""))
                          if FALLBACK_RE.search(msg):
                              return (4, None, "codex model-metadata fallback: requested %r not served: %s" % (requested, msg))
                          return (5, None, "unrecognized codex item.error; refusing to certify: %s" % msg)
              resolved = requested  # honored: no fallback, recognized schema, turn completed
              if not any(fnmatch.fnmatch(resolved, p) for p in allowlist.split()):
                  return (6, None, "resolved model %r not on allowlist %r" % (resolved, allowlist))
              return (0, resolved, "honored")
          def main(argv):
              if len(argv) != 4:
                  sys.stderr.write("usage: resolve_model.py <job_log> <requested_model> <allowlist>\n")
                  return 64
              text = open(argv[1], encoding="utf-8", errors="replace").read()
              code, resolved, reason = classify(text, argv[2], argv[3])
              if code == 0:
                  print(resolved)
              else:
                  sys.stderr.write("FAIL-CLOSED(%d): %s\n" % (code, reason))
              return code
          if __name__ == "__main__":
              sys.exit(main(sys.argv))
          # === RESOLVER END ===
          PY
          resolved="$(python3 resolve_model.py job.log "${MODEL}" "${ALLOWED_CODEX_MODELS:-}")"
          if [ -z "${resolved}" ]; then echo "::error::resolver produced no model (fail-closed)"; exit 1; fi
          echo "resolved=${resolved}" >> "${GITHUB_ENV}"
          echo "Requested model '${MODEL}' honored (no codex fallback); resolved-model='${resolved}'; allowlist-verified."

      - name: Download codex prose final-message
        uses: actions/download-artifact@v7
        with:
          name: codex-final-message-${{ inputs.prd }}
          path: incoming

      - name: Assemble the artifact with a single model identity (R4)
        env:
          PRD: ${{ inputs.prd }}
          SHA: ${{ inputs.sha }}
          PR: ${{ inputs.pr }}
          MODEL: ${{ inputs.model }}
          CODEX_VER: ${{ needs.review.outputs.codex-version }}
        run: |
          set -euo pipefail
          mkdir -p artifact
          out="artifact/PRD-${PRD}.review.codex.md"
          # R4: drop a leading prose self-report `Model:` line so the body cannot
          # contradict the machine provenance line (single identity source).
          body="$(awk 'NR==1 && /^Model:[[:space:]]/ {next} 1' incoming/codex-final-message.md)"
          {
            echo "# PRD-${PRD} — Codex cross-review"
            echo
            echo "- Reviewed commit (SHA-pinned): \`${SHA}\`"
            echo "- Target PR: ${PR:-n/a}"
            echo "- Provenance: resolved-model=\`${resolved}\` (requested=\`${MODEL}\` honored — no codex fallback event; allowlist-verified), codex-cli=\`${CODEX_VER:-unknown}\`, via openai/codex-action (read-only)"
            echo "- Mechanism: GitHub Actions (host-independent, PRD-197); fresh-context; honor verified from the completed review job log (PRD-207)"
            echo
            echo "---"
            echo
            printf '%s\n' "${body}"
          } > "${out}"

      - name: Upload review artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-review-${{ inputs.prd }}
          path: artifact/PRD-${{ inputs.prd }}.review.codex.md
          if-no-files-found: error

  # --- land: pushes the artifact to a durable codex-review/* branch and STOPS.
  #     It NEVER pushes to a protected branch, NEVER opens/auto-merges a PR, and
  #     NEVER sees the key. A human opens the PR from that branch at the seam, so
  #     ci.yml runs normally (a workflow-opened PR under GITHUB_TOKEN would not
  #     trigger CI) and the merge stays a human decision (PRD-184/PRD-194).
  land:
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push the codex-review/* working branch only
    steps:
      - name: Checkout the base branch (artifact lands as an artifact-only commit)
        uses: actions/checkout@v6
        with:
          # Root the artifact branch at the BASE, never at inputs.sha: rooting at an
          # unmerged PRD tip would carry that PRD's implementation into the artifact
          # branch, so the later human PR could land implementation, not just the doc.
          ref: ${{ inputs.base }}

      - name: Download review artifact
        uses: actions/download-artifact@v7
        with:
          name: codex-review-${{ inputs.prd }}
          path: incoming

      - name: Push the artifact to a durable codex-review/* branch (no PR, no auto-merge)
        env:
          PRD: ${{ inputs.prd }}
          SHA: ${{ inputs.sha }}
          BASE: ${{ inputs.base }}
        run: |
          set -euo pipefail
          base="${BASE:-main}"
          short="$(printf '%s' "${SHA}" | cut -c1-12)"
          work="codex-review/PRD-${PRD}-${short}"
          # Fail-closed: this writer must only ever push a dedicated codex-review/*
          # branch. It must NEVER push directly to the base (which may be a
          # protected branch like main — forbidden by CLAUDE.md / PRD-184 / PRD-194).
          case "${work}" in
            codex-review/*) : ;;
            *) echo "::error::work branch '${work}' is not under codex-review/; refusing"; exit 1 ;;
          esac
          dest="docs/prd_history/PRD-${PRD}.review.codex.md"
          mv "incoming/PRD-${PRD}.review.codex.md" "${dest}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${work}"
          git add "${dest}"
          git commit -m "PRD-${PRD}: Codex cross-review artifact (reviewed ${SHA})"
          # Push ONLY the codex-review/* work branch — never the base branch directly.
          git push origin "HEAD:${work}"
          {
            echo "### Codex review artifact landed on a branch";
            echo "";
            echo "Branch: \`${work}\` (artifact-only, rooted at \`${base}\`, reviewed \`${SHA}\`).";
            echo "";
            echo "Open a PR \`${work}\` → \`${base}\` to land it. CI runs on the human-opened PR; merge at the seam.";
          } >> "${GITHUB_STEP_SUMMARY}"
