name: Codex cross-review

# PRD-197 — host-independent Codex cross-review (the PRD-#21 gate artifact in CI).
#
# SECURITY (HIGH-RISK, public repo):
#   * Dispatch-only. NEVER add `pull_request` / `pull_request_target`: a fork run
#     would expose OPENAI_API_KEY to untrusted code.
#   * OPENAI_API_KEY is consumed ONLY as the `openai-api-key` input of the
#     official openai/codex-action, which proxies it. It is NEVER a job/step
#     `env:` and is NEVER echoed.
#   * Two-job split: `review` holds the key (proxied) with contents:read ONLY and
#     cannot write; `land` never sees the key.
#   * `land` NEVER pushes to a protected branch (e.g. main) and NEVER opens or
#     auto-merges a PR. It pushes the artifact to a durable codex-review/* branch
#     (rooted at the base, so artifact-only) and stops; a human opens the PR at the
#     seam so ci.yml runs and the merge stays a human decision (PRD-184/PRD-194).
#
# Supply-chain: `openai/codex-action` is pinned to a commit SHA (v1.8) at the
# review step below. `codex-version` is intentionally left unpinned there so the
# action installs a current sandbox-capable Codex CLI.

on:
  workflow_dispatch:
    inputs:
      prd:
        description: "Target PRD number (e.g. 197)"
        required: true
        type: string
      sha:
        description: "Head SHA of the target branch to review (pinned; the artifact is tied to this)"
        required: true
        type: string
      base:
        description: "Base branch the artifact PR targets (default main). The artifact ALWAYS lands via a CI-gated PR, never a direct push."
        required: false
        default: main
        type: string
      pr:
        description: "Target PR number (provenance/context; optional)"
        required: false
        type: string
      model:
        description: "REQUESTED Codex model id. This is only the request — the artifact's provenance records the RESOLVED model from runtime response metadata, which must pass the ALLOWED_CODEX_MODELS allowlist below."
        required: false
        default: gpt-5-codex
        type: string

# No permissions by default; each job opts in to least privilege.
permissions: {}

# Property-#3 (PRD-#21 "verified-real Codex") allowlist — HUMAN-CONFIGURABLE.
# The RESOLVED model (parsed from runtime response metadata, never the requested
# string and never the model's prose self-report) must match one of these
# space-separated shell globs, or the review is marked INVALID and NO artifact is
# emitted (fail-closed). EMPTY by default ⇒ every model is rejected until a human
# authorizes genuine Codex model id(s) here (e.g. "gpt-5-codex gpt-5-codex-*").
env:
  ALLOWED_CODEX_MODELS: ""

concurrency:
  group: codex-review-${{ inputs.prd }}-${{ inputs.sha }}
  cancel-in-progress: false

jobs:
  # --- review: holds the key (via the action proxy), READ-ONLY, cannot write ---
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout target branch at the pinned SHA (fresh context)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - name: Codex cross-review (read-only; key proxied by the action)
        id: codex
        uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1 # v1.8 (pinned)
        with:
          # Secret consumed only here, as the action input it proxies — never an env: var.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          model: ${{ inputs.model }}
          # Emit the JSONL event stream so the RESOLVED model (response metadata) can
          # be parsed for truthful provenance — the request string is NOT authoritative.
          codex-args: --json
          # codex-version intentionally unpinned: the action installs a current
          # sandbox-capable CLI (0.2.x predates the --sandbox flag, which would
          # make `sandbox: read-only` unenforceable). The actual version is
          # captured at runtime via `codex --version` for provenance below.
          working-directory: ${{ github.workspace }}
          output-file: codex-final-message.md
          allow-users: dwats250
          prompt: |
            You are performing an INDEPENDENT Codex cross-review of PRD-${{ inputs.prd }}
            for the Cuttingboard repository, reviewing the checked-out target branch at
            commit ${{ inputs.sha }} with fresh context (no prior authoring conversation).

            Read docs/prd_history/PRD-${{ inputs.prd }}.md, VISION.md, CLAUDE.md, and the
            files the PRD touches. Produce a structured review:
              - VERDICT: APPROVE / APPROVE WITH EDITS / REQUEST CHANGES
              - REQUIRED EDITS (blocking)
              - RECOMMENDED EDITS (non-blocking)
              - RATIONALE
              - DRIFT CHECK: does the change conflict with a VISION.md non-goal/principle,
                and does it leave any docs/PROJECT_STATE.md claim stale?
            State explicitly which Codex model you are running as.

      - name: Resolve + verify the served model, then assemble the artifact (truthful provenance, fail-closed)
        env:
          PRD: ${{ inputs.prd }}
          SHA: ${{ inputs.sha }}
          PR: ${{ inputs.pr }}
          MODEL: ${{ inputs.model }}
          # Raw codex stdout (JSONL, because codex-args: --json) — the authoritative
          # source for the RESOLVED model. Passed via env to avoid heredoc injection.
          CODEX_EVENTS: ${{ steps.codex.outputs.final-message }}
        run: |
          set -euo pipefail
          # Provenance: query the installed Codex CLI version (no secret involved).
          codex_ver="$(codex --version 2>/dev/null || echo 'unknown')"

          # --- Resolve the SERVED model from runtime response metadata ------------
          # Authoritative source only: the JSONL event stream (and, as a fallback,
          # the codex session rollout). NEVER the requested input string, NEVER the
          # model's prose self-report — those are exactly what property #3 distrusts.
          printf '%s\n' "${CODEX_EVENTS}" > codex-events.jsonl
          extract_model() { grep -oE '"model"[[:space:]]*:[[:space:]]*"[^"]+"' "$1" 2>/dev/null \
            | sed -E 's/.*:[[:space:]]*"([^"]+)"/\1/' | tail -n1; }
          resolved="$(extract_model codex-events.jsonl || true)"
          if [ -z "${resolved}" ]; then
            rollout="$(find "${CODEX_HOME:-$HOME/.codex}" -name 'rollout-*.jsonl' 2>/dev/null | sort | tail -n1 || true)"
            [ -n "${rollout}" ] && resolved="$(extract_model "${rollout}" || true)"
          fi
          if [ -z "${resolved}" ]; then
            echo "::error::could not determine the RESOLVED model from runtime response metadata; refusing to emit a review artifact (fail-closed)."
            exit 1
          fi

          # --- Fail-closed allowlist (property #3): reject any non-allowlisted model
          allowed=0
          for pat in ${ALLOWED_CODEX_MODELS:-}; do
            # shellcheck disable=SC2254
            case "${resolved}" in ${pat}) allowed=1; break ;; esac
          done
          if [ "${allowed}" -ne 1 ]; then
            echo "::error::resolved model '${resolved}' is not on the human-configured allowlist (ALLOWED_CODEX_MODELS='${ALLOWED_CODEX_MODELS:-}'); marking review INVALID (fail-closed). A genuine Codex model must be authorized in the workflow env before a review artifact can be emitted."
            exit 1
          fi
          echo "Resolved model '${resolved}' verified against allowlist '${ALLOWED_CODEX_MODELS:-}'."

          # --- Assemble the artifact with TRUTHFUL provenance ---------------------
          mkdir -p artifact
          out="artifact/PRD-${PRD}.review.codex.md"
          {
            echo "# PRD-${PRD} — Codex cross-review"
            echo
            echo "- Reviewed commit (SHA-pinned): \`${SHA}\`"
            echo "- Target PR: ${PR:-n/a}"
            echo "- Provenance: resolved-model=\`${resolved}\` (requested=\`${MODEL}\`; allowlist-verified), codex-cli=\`${codex_ver}\`, via openai/codex-action (read-only)"
            echo "- Mechanism: GitHub Actions (host-independent, PRD-197); fresh-context"
            echo
            echo "---"
            echo
            cat codex-final-message.md
          } > "${out}"

      - name: Upload review artifact
        uses: actions/upload-artifact@v7
        with:
          name: codex-review-${{ inputs.prd }}
          path: artifact/PRD-${{ inputs.prd }}.review.codex.md
          if-no-files-found: error

  # --- land: pushes the artifact to a durable codex-review/* branch and STOPS.
  #     It NEVER pushes to a protected branch, NEVER opens/auto-merges a PR, and
  #     NEVER sees the key. A human opens the PR from that branch at the seam, so
  #     ci.yml runs normally (a workflow-opened PR under GITHUB_TOKEN would not
  #     trigger CI) and the merge stays a human decision (PRD-184/PRD-194).
  land:
    needs: review
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push the codex-review/* working branch only
    steps:
      - name: Checkout the base branch (artifact lands as an artifact-only commit)
        uses: actions/checkout@v6
        with:
          # Root the artifact branch at the BASE, never at inputs.sha: rooting at an
          # unmerged PRD tip would carry that PRD's implementation into the artifact
          # branch, so the later human PR could land implementation, not just the doc.
          ref: ${{ inputs.base }}

      - name: Download review artifact
        uses: actions/download-artifact@v7
        with:
          name: codex-review-${{ inputs.prd }}
          path: incoming

      - name: Push the artifact to a durable codex-review/* branch (no PR, no auto-merge)
        env:
          PRD: ${{ inputs.prd }}
          SHA: ${{ inputs.sha }}
          BASE: ${{ inputs.base }}
        run: |
          set -euo pipefail
          base="${BASE:-main}"
          short="$(printf '%s' "${SHA}" | cut -c1-12)"
          work="codex-review/PRD-${PRD}-${short}"
          # Fail-closed: this writer must only ever push a dedicated codex-review/*
          # branch. It must NEVER push directly to the base (which may be a
          # protected branch like main — forbidden by CLAUDE.md / PRD-184 / PRD-194).
          case "${work}" in
            codex-review/*) : ;;
            *) echo "::error::work branch '${work}' is not under codex-review/; refusing"; exit 1 ;;
          esac
          dest="docs/prd_history/PRD-${PRD}.review.codex.md"
          mv "incoming/PRD-${PRD}.review.codex.md" "${dest}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${work}"
          git add "${dest}"
          git commit -m "PRD-${PRD}: Codex cross-review artifact (reviewed ${SHA})"
          # Push ONLY the codex-review/* work branch — never the base branch directly.
          git push origin "HEAD:${work}"
          {
            echo "### Codex review artifact landed on a branch";
            echo "";
            echo "Branch: \`${work}\` (artifact-only, rooted at \`${base}\`, reviewed \`${SHA}\`).";
            echo "";
            echo "Open a PR \`${work}\` → \`${base}\` to land it. CI runs on the human-opened PR; merge at the seam.";
          } >> "${GITHUB_STEP_SUMMARY}"
